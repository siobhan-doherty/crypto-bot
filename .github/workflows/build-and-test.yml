name: Build and Test

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  lint-and-unit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install isort black mypy bandit ruff pytest pytest-cov
          pip install -r requirements-dev.txt

      - name: Check import order with isort
        run: isort --check-only --profile black src/ tests/

      - name: Check code formatting with black
        run: black --check --diff src/ tests/

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Security linting with bandit
        run: bandit -r src/ -c pyproject.toml

      - name: Static type checking with mypy
        run: mypy src/ --ignore-missing-imports

      - name: Unit tests with coverage
        run: |
          pytest tests/ \
            --ignore=tests/test_full_pipeline.py \
            --ignore=tests/test_kafka_integration.py \
            --cov=src \
            --cov-fail-under=50 \
            --cov-report=term \
            --cov-report=xml

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Build required images
        run: |
          docker build -f src/collection_admin/docker/Dockerfile.data_collector -t crypto_data_collector .
          docker build -f src/api_user/docker/Dockerfile.fastapi -t crypto-bot-fastapi .

      - name: Run E2E streaming test
        run: bash scripts/run-e2e.sh

  e2e-full:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      # create required .env files for CI
      - name: Create .env files for CI
        run: |
          # Root .env (used by Airflow and compose variable interpolation)
          cat > .env << EOF
          AIRFLOW_ADMIN_USERNAME=admin
          AIRFLOW_ADMIN_PASSWORD=admin
          AIRFLOW_ADMIN_FIRSTNAME=Admin
          AIRFLOW_ADMIN_LASTNAME=User
          AIRFLOW_ADMIN_EMAIL=admin@example.com
          MONGO_INITDB_ROOT_USERNAME=admin
          MONGO_INITDB_ROOT_PASSWORD=password123
          AIRFLOW__CORE__EXECUTOR=LocalExecutor
          AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
          AIRFLOW__CORE__FERNET_KEY=$(python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())")
          AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=False
          AIRFLOW__CORE__LOAD_EXAMPLES=False
          AIRFLOW_UID=50000
          EOF

          # collection_admin .env (used by data_collector, producer, consumer)
          mkdir -p src/collection_admin
          cat > src/collection_admin/.env << EOF
          MONGO_URI=mongodb://admin:password123@crypto_mongo:27017/cryptobot?authSource=admin
          BINANCE_API_KEY=dummy_key
          BINANCE_SECRET_KEY=dummy_secret
          EOF

          # api_user .env (used by fastapi, dash)
          mkdir -p src/api_user
          cat > src/api_user/.env << EOF
          MONGO_URI=mongodb://admin:password123@crypto_mongo:27017/cryptobot?authSource=admin
          EOF

      - name: Build Docker images
        run: docker compose build

      - name: Start full stack
        run: docker compose up -d --wait

      # wait for Airflow to be ready before running tests
      - name: Wait for Airflow to be ready
        run: |
          for i in {1..30}; do
            if docker exec crypto_airflow airflow dags list >/dev/null 2>&1; then
              echo "Airflow is ready"
              break
            fi
            echo "Waiting for Airflow... (attempt $i/30)"
            sleep 5
          done

      - name: Run full E2E test
        env:
          E2E_TEST: 1
        run: pytest tests/test_full_pipeline.py -v

      - name: Stop stack
        run: docker compose down -v
        if: always()
