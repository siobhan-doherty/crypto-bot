services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: crypto_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks: [crypto_network]

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: crypto_kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    networks: [crypto_network]
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10

  mongodb:
    image: mongo:7.0
    container_name: crypto_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    networks: [crypto_network]

  data_collector:
    build:
      context: .
      dockerfile: src/collection_admin/docker/Dockerfile.data_collector
    image: crypto_data_collector
    container_name: crypto_data_collector
    env_file:
      - ./src/collection_admin/.env
    volumes:
      - ./src/collection_admin/.env:/app/.env:ro
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks: [crypto_network]

  kafka_producer:
    image: crypto_data_collector
    container_name: crypto_kafka_producer
    restart: unless-stopped
    env_file:
      - ./src/collection_admin/.env
    volumes:
      - ./src/collection_admin/.env:/app/.env:ro
    depends_on:
      kafka:
        condition: service_healthy
    command: ["python", "/app/src/collection_admin/data/kafka_producer.py"]
    healthcheck:
      test: ["CMD-SHELL", "pgrep -fa kafka_producer.py >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks: [crypto_network]

  kafka_consumer:
    image: crypto_data_collector
    container_name: crypto_kafka_consumer
    restart: unless-stopped
    env_file:
      - ./src/collection_admin/.env
    volumes:
      - ./src/collection_admin/.env:/app/.env:ro
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    command: ["python", "/app/src/collection_admin/data/kafka_consumer.py"]
    healthcheck:
      test: ["CMD-SHELL", "pgrep -fa kafka_consumer.py >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks: [crypto_network]

  fastapi:
    build:
      context: .
      dockerfile: src/api_user/docker/Dockerfile.fastapi
    container_name: crypto_fastapi
    ports:
      - "8000:8000"
    env_file:
      - ./src/api_user/.env
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      MONGO_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017/cryptobot?authSource=admin
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      LOG_LEVEL: debug
      DEBUG: "1"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks: [crypto_network]
    
  dash:
    build:
      context: .
      dockerfile: src/api_user/docker/Dockerfile.dash
    container_name: crypto_dash
    ports:
      - "8050:8050"
    env_file:
      - ./src/api_user/.env
    depends_on:
      mongodb:
        condition: service_healthy
      fastapi:
        condition: service_healthy
    environment:
      MONGO_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017/cryptobot?authSource=admin
      API_BASE_URL: http://fastapi:8000/api
      PYTHONPATH: /app/src
    command: ["python", "-m", "api_user.visualization.dash_app"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8050/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks: [crypto_network]

  postgres:
    image: postgres:15
    container_name: crypto_postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - crypto_network
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  airflow-init:
    image: apache/airflow:2.9.1-python3.11
    container_name: crypto_airflow_init
    depends_on:
      - postgres
    env_file:
      - .env
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db init
        airflow users create \
          --username $AIRFLOW_ADMIN_USERNAME \
          --password $AIRFLOW_ADMIN_PASSWORD \
          --firstname $AIRFLOW_ADMIN_FIRSTNAME \
          --lastname $AIRFLOW_ADMIN_LASTNAME \
          --role Admin \
          --email $AIRFLOW_ADMIN_EMAIL
    networks:
      - crypto_network

  airflow:
      image: apache/airflow:2.9.1-python3.11
      container_name: crypto_airflow
      user: root
      depends_on:
        - airflow-init
        - postgres
      env_file:
        - .env
      volumes:
        - ./airflow/dags:/opt/airflow/dags
        - ./airflow/logs:/opt/airflow/logs  
        - ./src/collection_admin/data:/app/data
        - /var/run/docker.sock:/var/run/docker.sock
      ports:
        - "8080:8080"
      command: webserver
      networks:
        - crypto_network
      healthcheck:
        test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
        interval: 30s
        timeout: 10s
        retries: 5
        
  airflow-scheduler:
    image: apache/airflow:2.9.1-python3.11
    container_name: crypto_airflow_scheduler
    user: root
    depends_on:
      - postgres
    env_file:
      - .env
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - /var/run/docker.sock:/var/run/docker.sock
    command: scheduler
    networks:
      - crypto_network
    healthcheck:
      test: ["CMD", "airflow", "jobs", "check", "--job-type", "SchedulerJob"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  postgres_data:  # named volume for Postgres data persistence
  mongo_data:  # named volume for MongoDB data persistence

networks:
  crypto_network:
    name: crypto_network
    driver: bridge
